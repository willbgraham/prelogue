name: Daily social scene

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily (~9am ET)
  workflow_dispatch: {}     # on-demand "Run workflow" button

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install worker deps
        working-directory: video-worker
        run: npm ci
      - name: Ensure headless Chrome
        working-directory: video-worker
        run: npx remotion browser ensure
      - name: Generate + render the daily scene
        working-directory: video-worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: node scripts/run-daily.js
